[environment]
log_file_name=/home/tangchen/uc-ts/logs/ucts.log
log_level = info
; 滚动日志: 长驻进程免重启换日志。每日 00:00 换文件; 单文件超 1GB 也滚动;
; 最多保留 14 份旧文件(最老自动删除, 磁盘有界)。
log_rotation_daily_time=00:00
log_rotation_max_size_mb=1024
log_max_backup_files=14
sys_config_file=/home/tangchen/uc-ts/configs/ucts.cfg

[universe]
symbols=BINANCE_PERP_BTC_USDT BINANCE_SPOT_BTC_USDT

[client]
client_cpu_number=-1
