    modules = {
        oms = {
            enabled = true; // 是否启用oms模块
            dispatcher = {
                cpu_affinity = 1;
                // 空转退避策略（可选）。不配 = 纯 spin，行为同旧版忙轮询、零额外延迟。
                // backoff=false：固定睡眠模式，sleep_us 微秒（0 = 纯 spin）；backoff=true：三阶段退避（先自旋、再忙等、最后 sleep_for 从 min 翻倍到 max 封顶）。
                // 注意：与 cpu_affinity 同配且 backoff=true 时，绑核优先、强制纯 spin 并告警。
                // idle = { backoff = false; sleep_us = 0; backoff_spins = 10; backoff_spins_delay = 10; backoff_min_us = 10; backoff_max_us = 100; };
            };
            agent = {
                mode = 0;   // 0-SHARED, 共享agent模式; 1-DEDICATED, 各账户agent独立模式;默认为共享agent模式
                cpu_affinity_start = 5; // agent的起始cpu亲和性
                // OMS 的 Exchange::Agent worker 循环空转退避；字段含义同 dispatcher.idle。
                idle = { backoff = false; sleep_us = 0; backoff_spins = 10; backoff_spins_delay = 10; backoff_min_us = 10; backoff_max_us = 100; };
            };
        };

        md = {
            enabled = true; // 是否启用md模块
            cpu_affinities = {
                // cpu number
                md_agent_wkr1 = 2;
                md_agent_wkr2 = 3;
                md_agent_wkr3 = 4;
            };
            // MD agent worker 循环空转退避；MD 高吞吐、延迟不敏感，较适合开 backoff 省 CPU；字段含义同 dispatcher.idle。
            idle = { backoff = false; sleep_us = 0; backoff_spins = 10; backoff_spins_delay = 10; backoff_min_us = 10; backoff_max_us = 100; };
            subscribe = {
                symbols = ["btc-usdt"];
                topics = ["trade", "orderbook","bookticker"];
            };
        };
        kafka_md = {
            enabled = false; // 是否启用kafka_md模块，默认false
            brokers = "18.176.167.150:19092,3.112.214.127:19092,52.68.253.112:19092";   // kafka broker列表，逗号分隔，格式host:port，必填
            group_id = "group_shuke";   // 消费者组id，必填
            msg_format = 1;   // 消息格式，选填，1-JSON格式，2-MSGPACK格式，默认为1
            // 预订阅的topic列表，非必填，可以在运行时动态订阅
            subscriptions = (
                {
                    topic = "merge.clob.md.BINANCE.LINEAR.AllInOne.v1";    // kafka topic名称，必填，Binance Linear 的全类型行情数据
                    keys = ["btc-usdt", "eth-usdt"];    // 订阅的key列表，缺省表示订阅该topic下的所有key
                    offset_mode = "END";    // 偏移量模式，可选值: END, BEGINNING, CUSTOM_OFFSET, CUSTOM_TIMESTAMP; 默认为END
                    offset_value = 0;   // 偏移量数值，offset_mode 为 CUSTOM_OFFSET 或 CUSTOM_TIMESTAMP 时有效
                }
            );

        };

        redis = {
            enabled = false; // 是否启用redis功能
            host = "192.168.6.30";
            port = "6379";
            db_index = 0; // redis数据库索引，默认为0
            subscribe = {
                channels = ["channel1"];
                patterns = [];
            };
        };

        shm = {
            enabled = false; //是否启用shm
